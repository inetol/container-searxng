version: "3.8"

services:
  redis:
    image: docker.io/library/redis:7.2-alpine
    container_name: searxng-redis
    restart: unless-stopped
    entrypoint: redis-server --save 30 1 --loglevel warning
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - searxng-redis:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: redis-cli ping | grep PONG
      interval: 1m
      start_period: 10s
      timeout: 5s

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:61010:8080"
    env_file:
      - ./.searxng.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/searxng-data:/etc/searxng
      - ./override/usr/local/searxng/searx/static/themes/simple/img:/usr/local/searxng/searx/static/themes/simple/img
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: 3
    depends_on:
      - redis

volumes:
  searxng-redis:
